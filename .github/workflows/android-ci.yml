name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both
      sign_apk:
        description: 'Sign APK (Requires Secrets)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore (if signing enabled)
      if: ${{ inputs.sign_apk == true }}
      env:
        KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -n "$KEYSTORE_B64" ]; then
          echo "$KEYSTORE_B64" | base64 --decode > app/keystore.jks
          echo "storePassword=$KEYSTORE_PASSWORD" >> keystore.properties
          echo "keyPassword=$KEY_PASSWORD" >> keystore.properties
          echo "keyAlias=$KEY_ALIAS" >> keystore.properties
          echo "storeFile=keystore.jks" >> keystore.properties
        else
          echo "Keystore secret not found, signing will fail."
          exit 1
        fi

    - name: Build Debug APK
      if: ${{ inputs.build_type == 'debug' || inputs.build_type == 'both' }}
      run: ./gradlew assembleDebug --stacktrace

    - name: Build Release APK
      if: ${{ inputs.build_type == 'release' || inputs.build_type == 'both' }}
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload Debug APK
      if: ${{ inputs.build_type == 'debug' || inputs.build_type == 'both' }}
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK (Unsigned)
      if: ${{ (inputs.build_type == 'release' || inputs.build_type == 'both') && inputs.sign_apk == false }}
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned
        path: app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Upload Release APK (Signed)
      if: ${{ (inputs.build_type == 'release' || inputs.build_type == 'both') && inputs.sign_apk == true }}
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: app/build/outputs/apk/release/app-release.apk
